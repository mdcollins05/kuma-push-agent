services:
  test:
    build:
      context: .
      target: test
    profiles: ["test"]

  kuma-push-agent:
    build:
      context: .
      target: production
    container_name: kuma-push-agent
    volumes:
      - agent_data:/data
      - ./config:/config
    ports:
      - "3002:3002"
    restart: unless-stopped
    # Kuma credentials are configured at http://localhost:3002/setup on first run.
    # No secrets needed here.

volumes:
  agent_data:
