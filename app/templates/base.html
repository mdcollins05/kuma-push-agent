<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Kuma Push Agent{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <!-- Apply theme before CSS loads to avoid flash -->
  <script>(function(){var t=localStorage.getItem('theme')||'auto';var d=t==='auto'?(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):t;document.documentElement.setAttribute('data-bs-theme',d);})();</script>
  <link href="/static/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { opacity: 0; border-top: 3px solid #2dce89; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .status-up { color: #198754; }
    .status-down { color: #dc3545; }
    .status-unknown { color: #6c757d; }
    .badge-up { background-color: #198754; }
    .badge-down { background-color: #dc3545; }
    .badge-unknown { background-color: #6c757d; }
    .card { border: none; border-top: 2px solid rgba(45,206,137,.35); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    h5.fw-bold { color: #2dce89; }
    #theme-btn { color: rgba(255,255,255,.5); border-color: rgba(255,255,255,.2); }
    #theme-btn:hover { color: #fff; border-color: rgba(255,255,255,.4); }
    #theme-toggle .dropdown-menu { display: none; min-width: 0; padding: 2px; left: 50%; right: auto; transform: translateX(-50%); }
    #theme-toggle:hover .dropdown-menu { display: flex; }
    #theme-menu button { color: var(--bs-secondary-color); padding: 2px 7px; border-radius: 4px; background: none; border: none; }
    #theme-menu button:hover { color: var(--bs-body-color); background: var(--bs-tertiary-bg); }
    #theme-menu button.active { color: var(--bs-emphasis-color); background: var(--bs-secondary-bg); font-weight: 600; }
  </style>
</head>
<body>
{% if user is defined %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/"
       title="Kuma Push Agent v{{ app_version }}" data-bs-toggle="tooltip" data-bs-placement="bottom">
      <img src="/static/img/favicon.svg" width="24" height="24" alt="">
      Kuma Push Agent
    </a>
    <div class="d-flex align-items-center gap-3">
      <a href="/" class="nav-link text-white-50"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="/settings" class="nav-link text-white-50"><i class="bi bi-gear"></i> Settings</a>

      <div class="dropdown" id="theme-toggle">
        <button class="btn btn-sm btn-outline-secondary" id="theme-btn" title="Color theme">
          <i class="bi bi-circle-half" id="theme-icon"></i>
        </button>
        <ul class="dropdown-menu" id="theme-menu" style="flex-direction:row;">
          <li><button data-theme="light" title="Light"><i class="bi bi-sun"></i></button></li>
          <li><button data-theme="auto"  title="Auto"><i class="bi bi-circle-half"></i></button></li>
          <li><button data-theme="dark"  title="Dark"><i class="bi bi-moon"></i></button></li>
        </ul>
      </div>

      <form method="post" action="/logout" class="d-inline">
        <button type="submit" class="btn btn-sm btn-outline-secondary text-white-50">
          <i class="bi bi-box-arrow-right"></i> {{ user }}
        </button>
      </form>
    </div>
  </div>
</nav>
{% endif %}
<div class="container pb-5">
  {% block content %}{% endblock %}
</div>
<script>
(function () {
  var icons = { light: 'bi-sun', auto: 'bi-circle-half', dark: 'bi-moon' };

  function applyTheme(t) {
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var resolved = t === 'auto' ? (prefersDark ? 'dark' : 'light') : t;
    document.documentElement.setAttribute('data-bs-theme', resolved);
    localStorage.setItem('theme', t);
    var icon = document.getElementById('theme-icon');
    if (icon) icon.className = 'bi ' + (icons[t] || 'bi-circle-half');
    var menu = document.getElementById('theme-menu');
    if (menu) {
      menu.querySelectorAll('button[data-theme]').forEach(function (btn) {
        btn.classList.toggle('active', btn.dataset.theme === t);
      });
    }
  }

  applyTheme(localStorage.getItem('theme') || 'auto');

  var menu = document.getElementById('theme-menu');
  if (menu) {
    menu.addEventListener('click', function (e) {
      var btn = e.target.closest('button[data-theme]');
      if (btn) applyTheme(btn.dataset.theme);
    });
  }

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
    if ((localStorage.getItem('theme') || 'auto') === 'auto') applyTheme('auto');
  });

  document.body.style.opacity = 1;
})();
</script>
<script src="/static/js/bootstrap.bundle.min.js"></script>
<script>document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function(el){new bootstrap.Tooltip(el);});</script>
</body>
</html>
